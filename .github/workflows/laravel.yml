name: Laravel CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, redis
          coverage: none

      - name: Copy .env
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --no-scripts --no-interaction --prefer-dist

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Create required directories
        run: mkdir -p storage/framework/{cache,sessions,views} storage/logs bootstrap/cache

      - name: Directory permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create SQLite database
        run: touch database/database.sqlite

      - name: Create phpunit.xml
        run: |
          cp phpunit.xml.dist phpunit.xml 2>/dev/null || cat > phpunit.xml << 'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <phpunit xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:noNamespaceSchemaLocation="vendor/phpunit/phpunit/phpunit.xsd"
                   bootstrap="vendor/autoload.php"
                   colors="true"
                   cacheDirectory=".phpunit.cache">
            <testsuites>
              <testsuite name="Unit">
                <directory suffix="Test.php">./tests/Unit</directory>
              </testsuite>
              <testsuite name="Feature">
                <directory suffix="Test.php">./tests/Feature</directory>
              </testsuite>
            </testsuites>
            <php>
              <env name="APP_ENV" value="testing"/>
              <env name="BCRYPT_ROUNDS" value="4"/>
              <env name="CACHE_DRIVER" value="array"/>
              <env name="DB_CONNECTION" value="sqlite"/>
              <env name="DB_DATABASE" value="database/database.sqlite"/>
              <env name="MAIL_MAILER" value="array"/>
              <env name="QUEUE_CONNECTION" value="sync"/>
              <env name="SESSION_DRIVER" value="array"/>
              <env name="TELESCOPE_ENABLED" value="false"/>
            </php>
          </phpunit>
          XML

      - name: Run tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          CACHE_DRIVER: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          REDIS_HOST: localhost
        run: php artisan test
